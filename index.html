<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zisany Beauté | Salon Coiffure &amp; Esthétique — Sainte-Adèle</title>
    <meta name="description" content="Salon de coiffure et d'esthétique à Sainte-Adèle. Coupe, coloration, soins du visage, épilation, extensions de cils, ongles et soins corporels. Atmosphère chaleureuse, équipe professionnelle." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Playfair+Display:wght@400;500&family=Lato:wght@300;400;500&family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BeautySalon",
      "name": "Zisany Beauté",
      "description": "Salon de coiffure et d'esthétique à Sainte-Adèle dans les Laurentides.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "936, rue Valiquette",
        "addressLocality": "Sainte-Adèle",
        "addressRegion": "QC",
        "postalCode": "J8B 2M3",
        "addressCountry": "CA"
      },
      "telephone": "+14502290434",
      "url": "https://zisanybeaute.ca",
      "sameAs": ["https://www.facebook.com/zisanybeaute"],
      "openingHoursSpecification": [
        { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Tuesday","Wednesday","Thursday","Friday"], "opens": "09:00", "closes": "17:00" },
        { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "09:00", "closes": "15:00" }
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Services beauté",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Coiffure" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Soins du visage" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Épilation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Extensions de cils" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Ongles" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Soins corporels" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
